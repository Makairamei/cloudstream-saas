worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
    multi_accept on;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';
    access_log /var/log/nginx/access.log main;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    client_max_body_size 50m;
    gzip on;
    gzip_types text/plain text/css application/json application/javascript application/octet-stream;

    # ── Backend (NestJS :3001) ──────────────────────────────
    upstream backend {
        server backend:3001;
    }

    # ── Frontend (Next.js :3000) ────────────────────────────
    upstream frontend {
        server frontend:3000;
    }

    # ── HTTP → redirect to HTTPS (if SSL certs exist) ──────
    # If no SSL certs, serve everything on HTTP port 80.

    server {
        listen 80;
        server_name _;

        # Real IP from Cloudflare / upstream proxy
        set_real_ip_from 0.0.0.0/0;
        real_ip_header X-Forwarded-For;
        real_ip_recursive on;

        # Public plugin API — forward to backend
        location ~ ^/(api|r|plugin)/ {
            proxy_pass http://backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 60s;
            proxy_connect_timeout 10s;
        }

        # Admin dashboard (Next.js)
        location / {
            proxy_pass http://frontend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_read_timeout 60s;
        }
    }

    # ── HTTPS server (enabled only when SSL certs are present) ──
    # To enable: place cert.pem and key.pem in ./nginx/ssl/ then uncomment below.
